<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Rituels Moona</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    @keyframes moona-fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes moona-fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes moona-slide-in {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes moona-slide-out {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(-20px) scale(0.97); }
    }
    @keyframes moona-orb-1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(40px, -30px) scale(1.08); }
      66%       { transform: translate(-20px, 20px) scale(0.95); }
    }
    @keyframes moona-orb-2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      40%       { transform: translate(-50px, 30px) scale(1.1); }
      70%       { transform: translate(30px, -10px) scale(0.92); }
    }
    @keyframes moona-orb-3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(20px, 40px) scale(1.06); }
    }
    @keyframes moona-bounce {
      0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
      40%           { transform: scale(1.1); opacity: 1; }
    }
    @keyframes moona-wave {
      0%, 100% { transform: scaleY(0.5); }
      50%       { transform: scaleY(1); }
    }

    .moona-anim-1 { animation: moona-fade-up 0.6s cubic-bezier(.22,1,.36,1) both; animation-delay: 0.05s; }
    .moona-anim-2 { animation: moona-fade-up 0.6s cubic-bezier(.22,1,.36,1) both; animation-delay: 0.18s; }
    .moona-anim-3 { animation: moona-fade-up 0.6s cubic-bezier(.22,1,.36,1) both; animation-delay: 0.32s; }
    .moona-anim-4 { animation: moona-fade-up 0.6s cubic-bezier(.22,1,.36,1) both; animation-delay: 0.44s; }
    .moona-anim-5 { animation: moona-fade-up 0.6s cubic-bezier(.22,1,.36,1) both; animation-delay: 0.56s; }
    .moona-anim-6 { animation: moona-fade-in 0.7s ease both; animation-delay: 0.7s; }

    [hidden] { display: none !important; animation: none !important; }

    .moona-is-entering { animation: moona-slide-in 0.45s cubic-bezier(.22,1,.36,1) both !important; }
    .moona-is-leaving  { animation: moona-slide-out 0.3s ease forwards !important; pointer-events: none; }

    .moona-rituel {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
      overflow: hidden;
    }

    .moona-rituel__bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #fdf9f3 0%, #f5ede0 50%, #ede0d0 100%);
      z-index: -1;
    }

    .moona-rituel__orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.55;
      will-change: transform;
    }
    .moona-rituel__orb--1 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, #f5d9aa 0%, #f0c896 60%, transparent 100%);
      top: -80px; right: -60px;
      animation: moona-orb-1 18s ease-in-out infinite;
    }
    .moona-rituel__orb--2 {
      width: 360px; height: 360px;
      background: radial-gradient(circle, #e8c4a0 0%, #deb48c 60%, transparent 100%);
      bottom: 60px; left: -80px;
      animation: moona-orb-2 22s ease-in-out infinite;
    }
    .moona-rituel__orb--3 {
      width: 280px; height: 280px;
      background: radial-gradient(circle, #fde8c8 0%, #f5d9aa 60%, transparent 100%);
      top: 40%; left: 50%;
      transform: translate(-50%, -50%);
      animation: moona-orb-3 26s ease-in-out infinite;
      opacity: 0.3;
    }

    .moona-rituel__wrap {
      width: 100%; max-width: 580px; margin: 0 auto;
      display: flex; flex-direction: column; align-items: center; gap: 32px;
    }

    .moona-rituel__logo { opacity: 0.85; }
    .moona-rituel__logo--text {
      font-size: 22px; font-weight: 600; letter-spacing: 0.08em;
      color: #3a2e22; text-transform: uppercase;
    }

    .moona-rituel__greeting { text-align: center; }
    .moona-rituel__title {
      font-size: clamp(24px, 5vw, 36px); font-weight: 400;
      color: #3a2e22; margin: 0 0 10px; line-height: 1.25; letter-spacing: -0.01em;
    }
    .moona-rituel__subtitle { font-size: 15px; color: #7a6a56; margin: 0; line-height: 1.6; }

    .moona-rituel__moments { display: flex; flex-direction: column; gap: 14px; width: 100%; }

    .moona-rituel__moment {
      position: relative; display: flex; align-items: center;
      padding: 0; border: none; border-radius: 20px; overflow: hidden;
      cursor: pointer; background: transparent; text-align: left;
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.22s ease;
      box-shadow: 0 2px 16px rgba(90,60,20,0.08);
      -webkit-tap-highlight-color: transparent;
    }
    .moona-rituel__moment:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(90,60,20,0.14); }
    .moona-rituel__moment:active { transform: scale(0.98); }

    .moona-rituel__moment-bg { position: absolute; inset: 0; transition: opacity 0.3s ease; }
    .moona-rituel__moment:hover .moona-rituel__moment-bg { opacity: 0.85; }
    .moona-rituel__moment-bg--matin   { background: linear-gradient(110deg, #fff5e6 0%, #fde8c8 100%); }
    .moona-rituel__moment-bg--journee { background: linear-gradient(110deg, #fff9ee 0%, #f9e8c4 100%); }
    .moona-rituel__moment-bg--soir    { background: linear-gradient(110deg, #f0ece8 0%, #dfd3c4 100%); }

    .moona-rituel__moment-inner {
      position: relative; display: flex; align-items: center;
      gap: 16px; padding: 22px 24px; width: 100%;
    }
    .moona-rituel__moment-inner::after {
      content: '→'; color: #c9a96e; font-size: 18px;
      margin-left: auto; flex-shrink: 0; transition: transform 0.2s ease;
    }
    .moona-rituel__moment:hover .moona-rituel__moment-inner::after { transform: translateX(4px); }

    .moona-rituel__moment-emoji {
      font-size: 32px; line-height: 1; flex-shrink: 0;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    }
    .moona-rituel__moment:hover .moona-rituel__moment-emoji { transform: scale(1.15) rotate(-5deg); }

    .moona-rituel__moment-inner > div { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .moona-rituel__moment-label { font-size: 17px; font-weight: 500; color: #3a2e22; display: block; letter-spacing: 0.01em; }
    .moona-rituel__moment-desc  { font-size: 13px; color: #9a856a; display: block; margin-top: 3px; line-height: 1.4; }

    .moona-rituel__player-wrap {
      width: 100%; background: rgba(255,255,255,0.7);
      border-radius: 24px; border: 1px solid rgba(180,155,120,0.2);
      backdrop-filter: blur(12px); padding: 28px 28px 32px;
      box-shadow: 0 4px 32px rgba(90,60,20,0.08);
    }
    .moona-rituel__player-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px;
    }
    .moona-rituel__back-btn {
      display: flex; align-items: center; gap: 6px; background: none; border: none;
      cursor: pointer; font-size: 13px; color: #9a856a; padding: 0;
      transition: color 0.15s, transform 0.2s ease;
    }
    .moona-rituel__back-btn:hover { color: #3a2e22; transform: translateX(-3px); }
    .moona-rituel__player-moment {
      font-size: 13px; color: #c9a96e; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase;
    }

    .moona-rituel__loader { display: flex; justify-content: center; gap: 7px; padding: 32px 0; }
    .moona-rituel__loader span {
      width: 8px; height: 8px; border-radius: 50%; background: #c9a96e;
      animation: moona-bounce 1.2s ease-in-out infinite;
    }
    .moona-rituel__loader span:nth-child(2) { animation-delay: 0.2s; }
    .moona-rituel__loader span:nth-child(3) { animation-delay: 0.4s; }

    .moona-rituel__waveform {
      display: flex; align-items: center; justify-content: center;
      gap: 3px; height: 48px; margin-bottom: 24px;
    }
    .moona-rituel__bar {
      display: block; width: 3px; height: var(--h, 40%);
      background: linear-gradient(to top, #e8d4b8, #c9a96e);
      border-radius: 2px; opacity: 0.5;
      animation: moona-wave 2s ease-in-out infinite;
      animation-delay: calc(var(--h) * -0.02s);
      transition: opacity 0.4s ease;
    }
    .moona-rituel__player.is-playing .moona-rituel__bar { opacity: 1; }

    .moona-rituel__controls { display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 20px; }

    .moona-rituel__play-btn {
      width: 60px; height: 60px; border-radius: 50%; background: #3a2e22;
      border: none; cursor: pointer; display: flex; align-items: center;
      justify-content: center; color: #fdf9f3;
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), background 0.18s ease, box-shadow 0.18s ease;
      flex-shrink: 0; box-shadow: 0 4px 16px rgba(58,46,34,0.25);
    }
    .moona-rituel__play-btn:hover { background: #c9a96e; transform: scale(1.1); box-shadow: 0 6px 24px rgba(201,169,110,0.4); }
    .moona-rituel__play-btn:active { transform: scale(0.95); }

    .moona-rituel__seek-btn {
      width: 40px; height: 40px; border-radius: 50%; background: rgba(180,155,120,0.12);
      border: none; cursor: pointer; display: flex; align-items: center;
      justify-content: center; color: #7a6a56;
      transition: background 0.15s, color 0.15s, transform 0.18s cubic-bezier(.34,1.56,.64,1);
    }
    .moona-rituel__seek-btn:hover { background: rgba(180,155,120,0.25); color: #3a2e22; transform: scale(1.08); }

    .moona-rituel__progress-wrap { display: flex; align-items: center; gap: 10px; }
    .moona-rituel__time { font-size: 12px; color: #9a856a; font-variant-numeric: tabular-nums; white-space: nowrap; min-width: 32px; text-align: center; }

    .moona-rituel__progress-track {
      flex: 1; height: 4px; background: rgba(180,155,120,0.2);
      border-radius: 4px; position: relative; cursor: pointer; outline: none;
      transition: height 0.2s ease;
    }
    .moona-rituel__progress-track:hover { height: 6px; }
    .moona-rituel__progress-fill {
      height: 100%; background: linear-gradient(to right, #c9a96e, #e8c98a);
      border-radius: 4px; width: 35%; pointer-events: none;
    }
    .moona-rituel__progress-thumb {
      position: absolute; top: 50%; left: 35%; transform: translate(-50%, -50%);
      width: 14px; height: 14px; background: #3a2e22; border-radius: 50%;
      pointer-events: none; opacity: 0; transition: opacity 0.15s;
      box-shadow: 0 2px 6px rgba(58,46,34,0.3);
    }
    .moona-rituel__progress-track:hover .moona-rituel__progress-thumb { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }

    .moona-rituel__footer { text-align: center; }
    .moona-rituel__shop-link {
      font-size: 13px; color: #9a856a; text-decoration: none;
      border-bottom: 1px solid rgba(154,133,106,0.3); padding-bottom: 1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .moona-rituel__shop-link:hover { color: #3a2e22; border-color: #3a2e22; }

    /* Toggle preview */
    .preview-toggle {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px); border-radius: 12px; padding: 8px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.12); z-index: 100;
    }
    .preview-toggle button {
      padding: 6px 16px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 500; transition: all 0.15s;
      background: transparent; color: #7a6a56;
    }
    .preview-toggle button.active { background: #3a2e22; color: #fdf9f3; }

    @media (min-width: 640px) {
      .moona-rituel__moments { flex-direction: row; }
      .moona-rituel__moment { flex: 1; min-width: 0; }
      .moona-rituel__moment-inner { flex-direction: column; align-items: flex-start; padding: 24px 20px; }
      .moona-rituel__moment-inner::after { content: none; }
      .moona-rituel__moment-emoji { font-size: 28px; margin-bottom: 4px; }
    }
    @media (max-width: 480px) {
      .moona-rituel__orb--1 { width: 280px; height: 280px; }
      .moona-rituel__orb--2 { width: 240px; height: 240px; }
      .moona-rituel__orb--3 { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      .moona-anim-1,.moona-anim-2,.moona-anim-3,.moona-anim-4,.moona-anim-5,.moona-anim-6 { animation: none; opacity: 1; }
      .moona-rituel__orb,.moona-rituel__bar,.moona-rituel__loader span { animation: none; }
    }
  </style>
</head>
<body>

<!-- Boutons de preview -->
<div class="preview-toggle">
  <button class="active" onclick="showView('moments')">Accueil</button>
  <button onclick="showView('player')">Player</button>
  <button onclick="replay()">↺ Rejouer</button>
</div>

<div class="moona-rituel" id="moona-rituel">
  <div class="moona-rituel__bg" aria-hidden="true">
    <div class="moona-rituel__orb moona-rituel__orb--1"></div>
    <div class="moona-rituel__orb moona-rituel__orb--2"></div>
    <div class="moona-rituel__orb moona-rituel__orb--3"></div>
  </div>

  <div class="moona-rituel__wrap">

    <div class="moona-rituel__logo moona-rituel__logo--text moona-anim-1">Moona</div>

    <div class="moona-rituel__greeting moona-anim-2" id="moona-greeting">
      <h1 class="moona-rituel__title">Tes rituels Moona</h1>
      <p class="moona-rituel__subtitle">Choisis un moment de la journée pour lancer ton audio de développement personnel.</p>
    </div>

    <!-- Sélecteur de moment -->
    <div class="moona-rituel__moments" id="moona-moments">

      <button class="moona-rituel__moment moona-anim-3" data-category="matin" type="button">
        <div class="moona-rituel__moment-bg moona-rituel__moment-bg--matin"></div>
        <div class="moona-rituel__moment-inner">
          <span class="moona-rituel__moment-emoji">🌅</span>
          <div>
            <span class="moona-rituel__moment-label">Matin</span>
            <span class="moona-rituel__moment-desc">Pour bien démarrer ta journée</span>
          </div>
        </div>
      </button>

      <button class="moona-rituel__moment moona-anim-4" data-category="journee" type="button">
        <div class="moona-rituel__moment-bg moona-rituel__moment-bg--journee"></div>
        <div class="moona-rituel__moment-inner">
          <span class="moona-rituel__moment-emoji">☀️</span>
          <div>
            <span class="moona-rituel__moment-label">Journée</span>
            <span class="moona-rituel__moment-desc">Pour te recentrer en pleine journée</span>
          </div>
        </div>
      </button>

      <button class="moona-rituel__moment moona-anim-5" data-category="soir" type="button">
        <div class="moona-rituel__moment-bg moona-rituel__moment-bg--soir"></div>
        <div class="moona-rituel__moment-inner">
          <span class="moona-rituel__moment-emoji">🌙</span>
          <div>
            <span class="moona-rituel__moment-label">Soir</span>
            <span class="moona-rituel__moment-desc">Pour clore ta journée en douceur</span>
          </div>
        </div>
      </button>

    </div>

    <!-- Player immersif -->
    <div class="moona-rituel__player-wrap" id="moona-player-wrap" hidden>
      <div class="moona-rituel__player-header">
        <button class="moona-rituel__back-btn" id="moona-back-btn" type="button">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Choisir un autre rituel
        </button>
        <span class="moona-rituel__player-moment" id="moona-player-moment">🌅 Matin</span>
      </div>

      <div class="moona-rituel__player is-playing" id="moona-player">
        <div class="moona-rituel__waveform" aria-hidden="true" id="waveform"></div>

        <div class="moona-rituel__controls">
          <button class="moona-rituel__seek-btn" type="button" aria-label="Reculer 15s">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M12 5V2L7 7l5 5V8c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" fill="currentColor"/>
              <text x="12" y="14.5" text-anchor="middle" font-size="5.5" fill="currentColor" font-family="sans-serif">15</text>
            </svg>
          </button>
          <button class="moona-rituel__play-btn" id="moona-play-btn" type="button" aria-label="Pause">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </button>
          <button class="moona-rituel__seek-btn" type="button" aria-label="Avancer 15s">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M12 5V2l5 5-5 5V8c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z" fill="currentColor"/>
              <text x="12" y="14.5" text-anchor="middle" font-size="5.5" fill="currentColor" font-family="sans-serif">15</text>
            </svg>
          </button>
        </div>

        <div class="moona-rituel__progress-wrap">
          <span class="moona-rituel__time">2:14</span>
          <div class="moona-rituel__progress-track">
            <div class="moona-rituel__progress-fill"></div>
            <div class="moona-rituel__progress-thumb"></div>
          </div>
          <span class="moona-rituel__time">6:30</span>
        </div>
      </div>
    </div>

    <div class="moona-rituel__footer moona-anim-6">
      <a href="#" class="moona-rituel__shop-link">← Retour à la boutique</a>
    </div>

  </div>
</div>

<script>
  // Générer les barres de la waveform
  const waveform = document.getElementById('waveform');
  for (let i = 1; i <= 32; i++) {
    const bar = document.createElement('span');
    bar.className = 'moona-rituel__bar';
    const h = ((i * 7) % 60) + 20;
    bar.style.setProperty('--h', h + '%');
    waveform.appendChild(bar);
  }

  function showEl(el) {
    el.hidden = false;
    el.classList.remove('moona-is-leaving');
    el.classList.add('moona-is-entering');
    el.addEventListener('animationend', () => el.classList.remove('moona-is-entering'), { once: true });
  }

  function hideEl(el, cb) {
    el.classList.add('moona-is-leaving');
    el.addEventListener('animationend', () => {
      el.classList.remove('moona-is-leaving');
      el.hidden = true;
      if (cb) cb();
    }, { once: true });
  }

  // Clic sur une card → affiche le player
  document.querySelectorAll('.moona-rituel__moment').forEach(btn => {
    btn.addEventListener('click', () => {
      const labels = { matin: '🌅 Matin', journee: '☀️ Journée', soir: '🌙 Soir' };
      document.getElementById('moona-player-moment').textContent = labels[btn.dataset.category];
      showView('player');
    });
  });

  // Bouton retour
  document.getElementById('moona-back-btn').addEventListener('click', () => showView('moments'));

  function showView(view) {
    const momentsEl = document.getElementById('moona-moments');
    const greetingEl = document.getElementById('moona-greeting');
    const playerWrap = document.getElementById('moona-player-wrap');

    // update toggle buttons
    document.querySelectorAll('.preview-toggle button').forEach((b, i) => {
      b.classList.toggle('active', (view === 'moments' && i === 0) || (view === 'player' && i === 1));
    });

    if (view === 'player') {
      hideEl(momentsEl);
      hideEl(greetingEl);
      setTimeout(() => showEl(playerWrap), 300);
    } else {
      hideEl(playerWrap, () => {
        showEl(greetingEl);
        showEl(momentsEl);
      });
    }
  }

  function replay() {
    location.reload();
  }
</script>
</body>
</html>
